<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Корзина заказа десертов Изюмка С.">
  <meta name="theme-color" content="#fdf8f5">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <title>Корзина — Изюмка С</title>
</head>
<body>
  <header class="header" id="site-header"></header>

  <main class="page">
    <div class="container">
      <div class="page-header fade-in">
        <span class="section-label section-label--blush">Корзина</span>
        <h1 class="page-title">Ваш заказ</h1>
        <p class="page-subtitle">Проверьте состав и оставьте контакты — заявка уйдёт в админку</p>
      </div>

      <div class="cart-layout" id="cart-layout">
        <div class="cart-list card-bakery" id="cart-list"></div>
        <aside class="cart-aside card-bakery" id="cart-aside"></aside>
      </div>

      <div class="cart-empty card-bakery" id="cart-empty" hidden>
        <h2>Корзина пуста</h2>
        <p>Добавьте десерты из каталога, чтобы оформить заказ.</p>
        <a href="catalog.html" class="btn-primary">Перейти в каталог</a>
      </div>

      <div class="form-feedback form-feedback--success cart-success" id="cart-success" hidden role="status">
        <p class="form-feedback__title">Заявка отправлена</p>
        <p class="form-feedback__text">Скоро свяжемся с вами для подтверждения деталей заказа.</p>
        <a href="catalog.html" class="btn-primary">Вернуться в каталог</a>
      </div>
    </div>
  </main>

  <footer class="footer" id="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
