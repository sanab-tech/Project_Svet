<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Изюмка С — домашняя кондитерская. Десерты из натуральных продуктов, ручная работа, самовывоз и доставка.">
  <meta name="theme-color" content="#fdf8f5">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ru_RU">
  <meta property="og:title" content="Изюмка С — Домашние десерты с любовью">
  <meta property="og:description" content="Домашняя кондитерская: медовик, бенто-торты, моти, макаронс и другие десерты с душой.">
  <meta property="og:image" content="images/hero-desserts.jpg">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <title>Изюмка С — Домашние десерты с любовью</title>
</head>
<body>
  <header class="header" id="site-header"></header>

  <main>
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__bg" aria-hidden="true">
        <div class="hero__blob hero__blob--1"></div>
        <div class="hero__blob hero__blob--2"></div>
        <div class="hero__blob hero__blob--3"></div>
      </div>
      <div class="container hero__content">
        <span class="hero__badge hero-animate hero-animate--1">
          <span class="hero__badge-dot" aria-hidden="true"></span>
          Handmade Bakery
        </span>
        <h1 class="hero__title hero-animate hero-animate--2" id="hero-title">Изюмка С</h1>
        <p class="hero__tagline hero-animate hero-animate--3" id="hero-tagline">Домашние десерты с любовью</p>
        <p class="hero__desc hero-animate hero-animate--4" id="hero-desc"></p>
        <div class="hero__actions hero-animate hero-animate--5">
          <a href="catalog.html" class="btn-primary">Смотреть каталог</a>
          <a href="delivery.html" class="btn-outline">Доставка и самовывоз</a>
        </div>
        <div class="hero__image-wrap hero-animate hero-animate--6">
          <div class="hero__image">
            <img src="images/hero-desserts.jpg" alt="Домашние десерты Изюмка С" id="hero-image" width="1200" height="750" fetchpriority="high" decoding="async">
          </div>
        </div>
      </div>
    </section>

    <section id="about" class="section-padding" aria-labelledby="about-heading">
      <div class="container about__grid">
        <div class="about__image-wrap fade-in fade-in--left">
          <div class="about__image">
            <img src="images/confectioner.jpg" alt="Светлана — кондитер Изюмка С" id="about-image" width="800" height="1000" loading="lazy" decoding="async">
          </div>
          <div class="about__stat">
            <p class="about__stat-num" id="about-stat-num">10+</p>
            <p class="about__stat-label" id="about-stat-label">лет опыта</p>
          </div>
        </div>
        <div class="fade-in fade-in--right" id="about-content"></div>
      </div>
    </section>

    <section class="section-padding catalog" aria-labelledby="featured-heading">
      <div class="container">
        <div class="section-header fade-in">
          <span class="section-label section-label--mint">Ассортимент</span>
          <h2 class="section-title" id="featured-heading">Популярные десерты</h2>
          <p class="section-subtitle section-subtitle--center">Выберите вкус и оформите заказ в корзине</p>
        </div>
        <div class="product-grid" id="featured-grid"></div>
        <div class="order__cta fade-in">
          <a href="catalog.html" class="btn-primary">Весь каталог</a>
        </div>
      </div>
    </section>

    <section class="section-padding" aria-labelledby="order-heading">
      <div class="container">
        <div class="section-header fade-in">
          <span class="section-label section-label--blush">Как заказать</span>
          <h2 class="section-title" id="order-heading">Три простых шага</h2>
        </div>
        <div class="steps" id="steps-grid"></div>
      </div>
    </section>

    <section id="reviews" class="section-padding reviews" aria-labelledby="reviews-heading">
      <div class="container">
        <div class="section-header fade-in">
          <span class="section-label section-label--mint">Отзывы</span>
          <h2 class="section-title" id="reviews-heading">Что говорят клиенты</h2>
        </div>
        <div class="reviews__grid" id="reviews-grid"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
