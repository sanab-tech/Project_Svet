<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Каталог домашних десертов Изюмка С: торты, моти, макаронс и печенье.">
  <meta name="theme-color" content="#fdf8f5">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <title>Каталог — Изюмка С</title>
</head>
<body>
  <header class="header" id="site-header"></header>

  <main class="page">
    <div class="container">
      <div class="page-header fade-in">
        <span class="section-label section-label--mint">Каталог</span>
        <h1 class="page-title">Наши десерты</h1>
        <p class="page-subtitle">Каждый десерт можно адаптировать под ваши пожелания — размер, декор и начинку обсудим индивидуально</p>
      </div>

      <div class="catalog-toolbar fade-in" id="catalog-filters"></div>
      <div class="product-grid" id="catalog-grid"></div>
      <p class="admin-empty" id="catalog-empty" hidden>В этой категории пока нет десертов.</p>
    </div>
  </main>

  <footer class="footer" id="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
